services:
  - type: web
    name: bi-agent-backend
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONDAY_API_TOKEN
        sync: false
      - key: MONDAY_WORKORDERS_BOARD_ID
        sync: false
      - key: MONDAY_DEALS_BOARD_ID
        sync: false
      - key: LLM_PROVIDER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CACHE_TTL_SECONDS
        value: "300"
